<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leah Clark - Scan to Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #0d0221 0%, #1a0533 50%, #2d1b4e 100%);
      color: #f0e6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .card {
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
      border-radius: 30px;
      padding: 50px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      border: 3px solid rgba(255, 215, 0, 0.3);
      box-shadow: 
        0 0 60px rgba(157, 78, 221, 0.3),
        0 0 100px rgba(255, 107, 157, 0.1);
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700 0%, #fff5c3 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.1rem;
      color: #a89cc8;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    .qr-container {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    
    .qr-code {
      width: 250px;
      height: 250px;
    }
    
    .instructions {
      font-size: 1.3rem;
      color: #f0e6ff;
      margin-bottom: 20px;
      font-weight: 600;
    }
    
    .description {
      font-size: 1rem;
      color: #a89cc8;
      line-height: 1.8;
      margin-bottom: 30px;
    }
    
    .highlight {
      color: #ff6b9d;
      font-weight: 600;
    }
    
    .url-display {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px 25px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #ffd700;
      word-break: break-all;
    }
    
    .arrow {
      font-size: 3rem;
      margin: 20px 0;
      animation: bounce 1s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    /* Print styles */
    @media print {
      body {
        background: white;
      }
      
      .card {
        box-shadow: none;
        border: 2px solid #333;
        background: white;
      }
      
      .logo {
        color: #333;
        -webkit-text-fill-color: #333;
      }
      
      .subtitle, .description, .instructions {
        color: #333;
      }
      
      .url-display {
        background: #f0f0f0;
        color: #333;
      }
    }
    
    /* Controls for setting URL */
    .controls {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(157, 78, 221, 0.3);
    }
    
    .url-input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid rgba(157, 78, 221, 0.5);
      background: rgba(0, 0, 0, 0.3);
      color: #f0e6ff;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      margin-bottom: 15px;
    }
    
    .url-input:focus {
      outline: none;
      border-color: #ff6b9d;
    }
    
    .btn {
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 5px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #9d4edd 0%, #ff6b9d 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid #9d4edd;
      color: #9d4edd;
    }
    
    .btn-outline:hover {
      background: #9d4edd;
      color: white;
    }
    
    @media print {
      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="logo">Leah Clark</h1>
    <p class="subtitle">Voice Actor</p>
    
    <div class="arrow">👇</div>
    
    <p class="instructions">Scan to Pre-Order Your Prints!</p>
    
    <div class="qr-container">
      <img src="" alt="QR Code" class="qr-code" id="qrCode">
    </div>
    
    <p class="description">
      Skip the wait! <span class="highlight">Scan the code</span>, browse the collection, 
      and save your selections. When you reach the booth, just give us your email 
      and your order will be ready!
    </p>
    
    <div class="url-display" id="urlDisplay">Loading...</div>
    
    <!-- Controls -->
    <div class="controls">
      <input 
        type="text" 
        class="url-input" 
        id="customUrl" 
        placeholder="Enter custom URL (or leave blank for auto-detect)"
      >
      <button class="btn btn-primary" onclick="generateQR()">Generate QR Code</button>
      <button class="btn btn-outline" onclick="printPage()">Print Sign</button>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-generate QR code on load
      generateQR();
    });
    
    async function generateQR() {
      const customUrl = document.getElementById('customUrl').value.trim();
      const url = customUrl || window.location.origin;
      
      try {
        const response = await fetch(`/api/qrcode?url=${encodeURIComponent(url)}`);
        const data = await response.json();
        
        document.getElementById('qrCode').src = data.qrcode;
        document.getElementById('urlDisplay').textContent = data.url;
      } catch (err) {
        console.error('Error generating QR code:', err);
        document.getElementById('urlDisplay').textContent = 'Error generating QR code';
      }
    }
    
    function printPage() {
      window.print();
    }
  </script>
</body>
</html>
