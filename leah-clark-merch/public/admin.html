<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leah Clark - Sales Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #9d4edd;
      --primary-dark: #7b2cbf;
      --accent: #ff6b9d;
      --gold: #ffd700;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0d0221;
      --bg-card: #1a0a2e;
      --text: #f0e6ff;
      --text-muted: #a89cc8;
    }
    
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(157, 78, 221, 0.3);
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold) 0%, #fff5c3 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .search-box {
      display: flex;
      gap: 10px;
    }
    
    .search-input {
      padding: 12px 20px;
      border-radius: 10px;
      border: 2px solid rgba(157, 78, 221, 0.5);
      background: var(--bg-card);
      color: var(--text);
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      min-width: 250px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
    }
    
    .btn-success {
      background: var(--success);
      color: white;
    }
    
    .btn-success:hover {
      background: #059669;
    }
    
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    
    .btn-danger:hover {
      background: #dc2626;
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    
    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      border: 2px solid var(--primary);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      background: var(--primary);
      color: white;
      outline: none;
    }
    
    .btn-small {
      padding: 8px 16px;
      font-size: 0.8rem;
    }
    
    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 25px;
      border: 1px solid rgba(157, 78, 221, 0.2);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
    }
    
    /* Orders List */
    .orders-section {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid rgba(157, 78, 221, 0.2);
      overflow: hidden;
    }
    
    .orders-header {
      padding: 20px 25px;
      background: rgba(157, 78, 221, 0.1);
      border-bottom: 1px solid rgba(157, 78, 221, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .orders-title {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      color: var(--gold);
    }
    
    .orders-list {
      max-height: calc(100vh - 350px);
      overflow-y: auto;
    }
    
    .order-card {
      padding: 20px 25px;
      border-bottom: 1px solid rgba(157, 78, 221, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .order-card:hover {
      background: rgba(157, 78, 221, 0.1);
    }
    
    .order-card.expanded {
      background: rgba(157, 78, 221, 0.15);
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .order-email {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }
    
    .order-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .order-time {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    .order-count {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .order-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
    }
    
    /* Order Details */
    .order-details {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(157, 78, 221, 0.2);
    }
    
    .order-card.expanded .order-details {
      display: block;
    }
    
    .order-items {
      margin-bottom: 20px;
    }
    
    .order-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(157, 78, 221, 0.1);
    }
    
    .order-item:last-child {
      border-bottom: none;
    }
    
    .order-item-image {
      width: 60px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--bg-dark);
    }
    
    .order-item-info {
      flex: 1;
    }
    
    .order-item-name {
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .order-item-size {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    .order-item-label {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 5px;
    }
    
    .order-item-price {
      font-weight: 600;
      color: var(--gold);
    }
    
    .order-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 60px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(157, 78, 221, 0.3);
    }
    
    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 20px;
    }
    
    .modal-actions {
      display: flex;
      gap: 15px;
      justify-content: flex-end;
      margin-top: 25px;
    }
    
    /* Sound notification */
    .notification-sound {
      display: none;
    }
    
    /* Refresh indicator */
    .refresh-indicator {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    .refresh-indicator.updating {
      color: var(--accent);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .logo {
        font-size: 1.4rem;
      }
      
      .search-input {
        min-width: 150px;
      }
      
      .stat-value {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">Sales Dashboard</h1>
      <div class="header-actions">
        <div class="search-box">
          <input 
            type="email" 
            class="search-input" 
            id="searchInput" 
            placeholder="Search by email..."
            onkeyup="handleSearch(event)"
          >
          <button class="btn btn-primary" onclick="searchOrders()">Search</button>
        </div>
        <button class="btn btn-outline" onclick="clearSearch()">Show All</button>
        <a class="nav-link" href="/schedule">Schedule</a>
        <span class="refresh-indicator" id="refreshIndicator">Auto-refresh: ON</span>
      </div>
    </header>
    
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Pending Orders</div>
        <div class="stat-value" id="pendingCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Items</div>
        <div class="stat-value" id="totalItems">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Estimated Revenue</div>
        <div class="stat-value" id="totalRevenue">$0</div>
      </div>
    </div>
    
    <!-- Orders -->
    <div class="orders-section">
      <div class="orders-header">
        <h2 class="orders-title">📋 Pending Orders</h2>
        <button class="btn btn-small btn-outline" onclick="loadOrders()">↻ Refresh</button>
      </div>
      <div class="orders-list" id="ordersList">
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <p>No pending orders yet.<br>Orders will appear here when customers submit them.</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">Confirm Action</h3>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn" id="modalConfirmBtn" onclick="confirmAction()">Confirm</button>
      </div>
    </div>
  </div>
  
  <script>
    let orders = [];
    let expandedOrderId = null;
    let pendingAction = null;
    let refreshInterval = null;
    let lastOrderCount = 0;

    const num = (value) => {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    };

    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));

    const fmt = (value) => `$${num(value).toFixed(2)}`;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadOrders();
      startAutoRefresh();
    });
    
    function startAutoRefresh() {
      refreshInterval = setInterval(() => {
        loadOrders(true);
      }, 5000); // Refresh every 5 seconds
    }
    
    async function loadOrders(silent = false) {
      if (!silent) {
        document.getElementById('refreshIndicator').classList.add('updating');
        document.getElementById('refreshIndicator').textContent = 'Refreshing...';
      }
      
      try {
        const response = await fetch('/api/admin/orders');
        if (!response.ok) {
          throw new Error(`Orders request failed: ${response.status}`);
        }
        orders = await response.json();
        
        // Check for new orders
        if (orders.length > lastOrderCount && lastOrderCount > 0) {
          playNotification();
        }
        lastOrderCount = orders.length;
        
        renderOrders();
        updateStats();
      } catch (err) {
        console.error('Error loading orders:', err);
      } finally {
        document.getElementById('refreshIndicator').classList.remove('updating');
        document.getElementById('refreshIndicator').textContent = 'Auto-refresh: ON';
      }
    }
    
    async function searchOrders() {
      const email = document.getElementById('searchInput').value.trim();
      
      if (!email) {
        loadOrders();
        return;
      }
      
      try {
        const response = await fetch(`/api/admin/search?email=${encodeURIComponent(email)}`);
        if (!response.ok) {
          throw new Error(`Search request failed: ${response.status}`);
        }
        orders = await response.json();
        renderOrders();
        updateStats();
      } catch (err) {
        console.error('Error searching orders:', err);
      }
    }
    
    function handleSearch(event) {
      if (event.key === 'Enter') {
        searchOrders();
      }
    }
    
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      loadOrders();
    }
    
    function renderOrders() {
      const list = document.getElementById('ordersList');
      
      if (orders.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>No pending orders found.</p>
          </div>
        `;
        return;
      }
      
      list.innerHTML = orders.map(order => `
        <div class="order-card ${expandedOrderId === order.id ? 'expanded' : ''}" 
             onclick="toggleOrder(${order.id})">
          <div class="order-header">
            <div class="order-email">${esc(order.email)}</div>
            <div class="order-meta">
              <span class="order-time">${esc(formatTime(order.created_at))}</span>
              <span class="order-count">${num(order.item_count)} items</span>
              <span class="order-total">${fmt(order.total)}</span>
            </div>
          </div>
          <div class="order-details" id="details-${order.id}">
            <div class="order-items" id="items-${order.id}">
              Loading...
            </div>
            <div class="order-actions">
              <button class="btn btn-small btn-success" onclick="event.stopPropagation(); completeOrder(${order.id})">
                ✓ Complete Sale
              </button>
              <button class="btn btn-small btn-danger" onclick="event.stopPropagation(); deleteOrder(${order.id})">
                ✕ Delete
              </button>
            </div>
          </div>
        </div>
      `).join('');
      
      // If there's an expanded order, load its details
      if (expandedOrderId) {
        loadOrderDetails(expandedOrderId);
      }
    }
    
    async function toggleOrder(orderId) {
      if (expandedOrderId === orderId) {
        expandedOrderId = null;
      } else {
        expandedOrderId = orderId;
        await loadOrderDetails(orderId);
      }
      renderOrders();
    }
    
    async function loadOrderDetails(orderId) {
      try {
        const response = await fetch(`/api/admin/orders/${orderId}`);
        if (!response.ok) {
          throw new Error(`Order details request failed: ${response.status}`);
        }
        const order = await response.json();
        
        const itemsContainer = document.getElementById(`items-${orderId}`);
        if (!itemsContainer) return;
        
        itemsContainer.innerHTML = order.items.map(item => `
          <div class="order-item">
            <img src="${esc(item.image_url)}" alt="${esc(item.name)}" class="order-item-image">
            <div class="order-item-info">
              <div class="order-item-name">${esc(item.name)}</div>
              <div class="order-item-size">${esc(item.size)}</div>
              <div class="order-item-label">${esc(item.label)}</div>
            </div>
            <div class="order-item-price">${fmt(item.price)}</div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Error loading order details:', err);
      }
    }
    
    function updateStats() {
      const pendingCount = orders.length;
      const totalItems = orders.reduce((sum, order) => sum + num(order.item_count), 0);
      const totalRevenue = orders.reduce((sum, order) => sum + num(order.total), 0);
      
      document.getElementById('pendingCount').textContent = pendingCount;
      document.getElementById('totalItems').textContent = totalItems;
      document.getElementById('totalRevenue').textContent = fmt(totalRevenue);
    }
    
    function completeOrder(orderId) {
      const order = orders.find(o => o.id === orderId);
      pendingAction = { type: 'complete', orderId };
      
      document.getElementById('modalTitle').textContent = 'Complete Sale';
      document.getElementById('modalMessage').textContent = 
        `Mark order for ${order?.email || 'this customer'} as completed? This will remove it from the pending list.`;
      document.getElementById('modalConfirmBtn').className = 'btn btn-success';
      document.getElementById('modalConfirmBtn').textContent = 'Complete';
      document.getElementById('confirmModal').classList.add('active');
    }
    
    function deleteOrder(orderId) {
      const order = orders.find(o => o.id === orderId);
      pendingAction = { type: 'delete', orderId };
      
      document.getElementById('modalTitle').textContent = 'Delete Order';
      document.getElementById('modalMessage').textContent = 
        `Are you sure you want to delete the order for ${order?.email || 'this customer'}? This cannot be undone.`;
      document.getElementById('modalConfirmBtn').className = 'btn btn-danger';
      document.getElementById('modalConfirmBtn').textContent = 'Delete';
      document.getElementById('confirmModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('confirmModal').classList.remove('active');
      pendingAction = null;
    }
    
    async function confirmAction() {
      if (!pendingAction) return;
      
      try {
        if (pendingAction.type === 'complete') {
          const response = await fetch(`/api/admin/orders/${pendingAction.orderId}/complete`, { method: 'POST' });
          if (!response.ok) throw new Error('Complete request failed');
        } else if (pendingAction.type === 'delete') {
          const response = await fetch(`/api/admin/orders/${pendingAction.orderId}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Delete request failed');
        }
        
        closeModal();
        expandedOrderId = null;
        loadOrders();
      } catch (err) {
        console.error('Error performing action:', err);
      }
    }
    
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffMins < 1440) return `${Math.floor(diffMins / 60)}h ago`;
      
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function playNotification() {
      // Create audio context for notification sound
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      } catch (e) {
        console.log('Audio notification not available');
      }
    }
  </script>
</body>
</html>
