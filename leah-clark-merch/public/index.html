<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #9d4edd;
      --primary-dark: #7b2cbf;
      --accent: #ff6b9d;
      --gold: #ffd700;
      --bg-dark: #0d0221;
      --bg-card: #1a0a2e;
      --text: #f0e6ff;
      --text-muted: #a89cc8;
    }
    
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at top, #1a0a2e 0%, transparent 50%),
        radial-gradient(ellipse at bottom, #2d1b4e 0%, transparent 50%),
        linear-gradient(180deg, #0d0221 0%, #1a0533 100%);
      background-attachment: fixed;
    }
    
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.3), transparent);
      background-size: 200px 200px;
      animation: twinkle 4s ease-in-out infinite alternate;
      z-index: 0;
    }
    
    @keyframes twinkle {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    header {
      text-align: center;
      padding: 40px 20px;
      margin-bottom: 30px;
    }

    .event-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 215, 0, 0.22);
      border-radius: 12px;
      background: rgba(13, 2, 33, 0.62);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .event-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .event-copy {
      text-align: left;
      line-height: 1.25;
    }

    .event-name {
      color: var(--text);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .event-date {
      color: var(--text-muted);
      font-size: 0.86rem;
      margin-top: 2px;
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold) 0%, #fff5c3 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      letter-spacing: 3px;
    }
    
    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Prints Grid */
    .prints-section {
      display: none;
    }
    
    .prints-section.active {
      display: block;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      margin-bottom: 25px;
      color: var(--gold);
      text-align: center;
    }

    .result-count {
      color: var(--text-muted);
      text-align: center;
      margin: -10px 0 24px;
      min-height: 1.4em;
    }
    
    .prints-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }
    
    .print-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, #2d1b4e 100%);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(157, 78, 221, 0.2);
      transition: all 0.4s ease;
      position: relative;
    }

    .print-card:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }
    
    .print-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 15px 40px rgba(157, 78, 221, 0.3);
    }
    
    .print-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: contain;
      background: #1a0a2e;
      display: block;
    }
    
    .print-info {
      padding: 20px;
    }
    
    .print-name {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .print-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    
    .print-size,
    .print-material {
      font-size: 0.9rem;
      color: var(--text-muted);
      background: rgba(157, 78, 221, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
    }
    
    /* Loading state */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(157, 78, 221, 0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      header {
        padding-top: 28px;
      }

      .event-badge {
        gap: 10px;
        margin-bottom: 18px;
      }

      .event-logo {
        width: 42px;
        height: 42px;
      }

      .logo {
        font-size: 1.8rem;
      }
      
      .prints-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

  </style>
</head>
<body>
  <div class="stars"></div>
  
  <div class="container">
    <header>
      <div class="event-badge" aria-label="Indy PopCon event dates">
        <img
          src="/assets/conventions/indy-popcon-logo.png"
          alt="Indy PopCon"
          class="event-logo"
          width="48"
          height="48"
        >
        <div class="event-copy">
          <div class="event-name">Indy PopCon</div>
          <div class="event-date">May 8-10, 2026</div>
        </div>
      </div>
      <h1 class="logo">Leah Clark</h1>
      <p class="subtitle">Browse Inventory</p>
    </header>

    <section class="prints-section active" id="printsSection">
      <h2 class="section-title">Browse Inventory</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">
        Browse inventory.
      </p>

      <p class="result-count" id="resultCount"></p>
      
      <div class="prints-grid" id="printsGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading catalog...</p>
        </div>
      </div>
    </section>
  </div>
  
  <script>
    let prints = [];

    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));

    document.addEventListener('DOMContentLoaded', async () => {
      await loadPrints();
    });

    async function loadPrints() {
      try {
        document.getElementById('printsGrid').innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading prints...</p>
          </div>
        `;

        const response = await fetch('/api/prints');
        if (!response.ok) {
          throw new Error(`Print request failed: ${response.status}`);
        }
        const data = await response.json();
        prints = (Array.isArray(data) ? data : []).map((print) => ({
          ...print,
          name: print.name || print.image_name || '',
          material: print.material || '',
          image: print.image || print.image_url || ''
        }));
        renderPrints();
        return true;
      } catch (err) {
        console.error('Error loading prints:', err);
        document.getElementById('printsGrid').innerHTML = 
          '<p style="color: var(--accent); text-align: center;">Error loading the catalog. Please refresh or ask booth staff for help.</p>';
        document.getElementById('resultCount').textContent = '';
        return false;
      }
    }
    
    function renderPrints() {
      const grid = document.getElementById('printsGrid');
      const resultCount = document.getElementById('resultCount');

      if (!prints.length) {
        grid.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No catalog items are available right now.</p>';
        resultCount.textContent = '';
        return;
      }

      resultCount.textContent = `Showing all ${prints.length} available ${prints.length === 1 ? 'print' : 'prints'}`;
      
      grid.innerHTML = prints.map((print) => {
        const image = print.image || print.image_url || '';
        const printName = print.name || 'Untitled print';
        return `
        <article class="print-card" data-id="${print.id}">
          <img src="${esc(image)}" alt="${esc(printName)}" class="print-image" loading="lazy" decoding="async">
          <div class="print-info">
            <h3 class="print-name">${esc(printName)}</h3>
            <div class="print-details">
              <span class="print-material">${esc(print.material)}</span>
              <span class="print-size">${esc(print.size)}</span>
            </div>
          </div>
        </article>
        `;
      }).join('');
    }
  </script>
</body>
</html>
